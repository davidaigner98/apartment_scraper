name: scrape_apartments

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # 1. checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. setup python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      # 4. restore database cache
      - name: Restore database cache
        uses: actions/cache/restore@v4
        with:
          path: listings.db
          key: listings-db-${{ github.run_id }}
          restore-keys: |
            listings-db-

      # 5. run scraper
      - name: Run scraper
        run: python scrape_listings.py

      # 6. save database cache
      - name: Save database cache
        uses: actions/cache/save@v4
        with:
          path: listings.db
          key: listings-db-${{ github.run_id }}
